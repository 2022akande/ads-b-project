services:
  backend:
    build: ./backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 20s
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /adsb/backend
        awslogs-create-group: "true"
        awslogs-stream: backend

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_WS_URL: ws://100.51.204.55/ws/stream
    environment:
      BACKEND_URL: http://backend:8000
    restart: unless-stopped

  caddy:
    image: caddy:2
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /adsb/caddy
        awslogs-create-group: "true"
        awslogs-stream: caddy