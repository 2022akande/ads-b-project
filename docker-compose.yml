services:
  backend:
    build: ./backend
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1        # your instance's region
        awslogs-group: /adsb/backend
        awslogs-create-group: "true"
        awslogs-stream: backend

  frontend:
    build:
      context: ./frontend
      args:
        # Baked into the client bundle at build time. Caddy proxies this path
        # to the backend. Switch to wss://<domain>/ws/stream if HTTPS is added.
        NEXT_PUBLIC_WS_URL: ws://100.51.204.55/ws/stream
    environment:
      # Server-side rewrite target for /api/* (next.config.mjs)
      BACKEND_URL: http://backend:8000
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-region: us-east-1
        awslogs-group: /adsb/caddy
        awslogs-create-group: "true"
        awslogs-stream: caddy
